# docker-compose.yml
version: '3.5'

networks:
  milvus_net:

services:
  etcd:
    container_name: cookhero_etcd
    image: quay.io/coreos/etcd:v3.5.16
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_ENABLE_V2=true
    volumes:
      - ./volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - milvus_net
    restart: always

  minio:
    container_name: cookhero_minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9000"  # Expose MinIO UI on a different port to avoid conflicts
    volumes:
      - ./volumes/minio:/data
    command: server /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - milvus_net
    restart: always

  milvus:
    container_name: cookhero_milvus
    image: milvusdb/milvus:v2.5.14
    command: ["milvus", "run", "standalone"]
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    ports:
      - "19530:19530" # Milvus gRPC port
      - "9091:9091"   # Milvus HTTP port
    depends_on:
      - etcd
      - minio
    networks:
      - milvus_net
    restart: always
